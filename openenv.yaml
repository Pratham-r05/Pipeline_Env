---
title: Pipeline Env
emoji: 🔧
colorFrom: purple
colorTo: cyan
sdk: docker
app_port: 7860
tags:
  - openenv
  - ci-cd
  - devops
  - rl-environment

---

name: "pipeline-env"
version: "1.0.0"
description: "RL environment for training agents to diagnose and repair broken CI/CD pipelines"
entrypoint: "server.app:app"
env_type: "docker"
web_interface: true

models:
  action:      "models:PipelineAction"
  observation: "models:PipelineObservation"
  state:       "models:PipelineState"

tasks:
  - id: "easy"
    description: "Fix a single failing unit test in the pipeline"
    difficulty: "easy"
    max_steps: 5
    expected_score: 1.0

  - id: "medium"
    description: "Fix broken Docker config and missing environment variable"
    difficulty: "medium"
    max_steps: 8
    expected_score: 1.0

  - id: "hard"
    description: "Diagnose and fix cascading multi-stage pipeline failure"
    difficulty: "hard"
    max_steps: 12
    expected_score: 1.0

repo: "https://huggingface.co/spaces/Endraode/pipeline-env"
license: "MIT"